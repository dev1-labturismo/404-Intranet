<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./img/faviconV2.png" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        body{
            background-size: cover;
            background-repeat: no-repeat;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }
        .blur1{
            height: 50%;
            width: 50%;
            background-color: #794b9b;
            filter: blur(416px);
            position: absolute;
            top: 60%;
        }
        .blur2{
            height: 50%;
            width: 50%;
            background-color: #ff3ee2;
            filter: blur(416px);
            position: absolute;
            left: 80%;
            bottom: 80%;
        }
        .wrapperHero{
            position: absolute;
            top: 25%; 
            left: 25%;
            font-size: x-large;
            line-height: 1ch;
            font-family: poppins;
            display: flex;
            gap: 2rem;
        }
        .hero{
            color: #5d4799;
        }
        .pc{
            max-width: 500px;
        }
    </style>
    <title>Intranet - 404 Not found</title>
</head>
<body>
    <div class="blur1"></div>
    <div class="blur2"></div>
    <div class="wrapperHero">
        <div class="hero">
            <img src="/img/logo.png" alt="Logo LabTurismo">
            <h1>Em Construção</h1>
            <p>Página em Desenvolvimento! - Em breve</p>
        </div>
        <img src="./img/pcNoBackground.png" alt="Imagem de computador" class="pc">
    </div>
</body>
</html
